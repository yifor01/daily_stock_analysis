instructions: |
  **波浪理論（Elliott Wave Theory）**

  核心原則：市場按照 5 浪推進 + 3 浪調整的迴圈結構執行。

  ## 分析步驟

  ### 1. 識別當前浪型
  使用 `get_daily_history` 獲取近 120 日資料，結合 `analyze_trend` 趨勢資料：

  **推動浪（1-3-5）識別特徵**：
  - 第1浪：趨勢反轉的第一波，成交量溫和放大。
  - 第3浪：最強勁的推動浪，通常放大量，MACD 強勢；絕不是最短浪。
  - 第5浪：量能往往弱於第3浪，出現頂背離則走高後即將結束。

  **調整浪（A-B-C）識別特徵**：
  - A 浪：第一次下跌，成交量較大，多數人以為是回撥。
  - B 浪：反彈，力度弱於前期漲幅，成交量萎縮，陷阱風險高。
  - C 浪：第二次下跌，力度往往超過 A 浪，完成調整。

  ### 2. 黃金位置判斷
  - 第2浪回撥通常在第1浪的 38.2%~61.8%。
  - 第3浪目標通常是第1浪的 1.618~2.618 倍延伸。
  - 第4浪不得進入第1浪價格區域（違反波浪規則）。
  - C浪目標：A 浪頂端起算，等於或超過 A 浪長度。

  ### 3. 最優買點
  - **第2浪回撥企穩**（黃金坑）：最安全買點，止損第1浪起點。
  - **第4浪回撥企穩**：次優，止損第1浪頂部。
  - **第3浪初期突破**：放量突破第1浪高點時。
  - 避免在第5浪末端追高（頂背離風險）。

  ### 4. 風險提示
  - B浪反彈不宜重倉（陷阱性質）。
  - 波浪計數存在主觀性，需結合其他技術指標驗證。
  - 若波浪規則被違反（如第4浪侵入第1浪），需重新歸數。

  ### 5. 輸出要求
  - 給出當前可能的浪型位置（如："處於第3浪中段"或"疑似第4浪調整"）。
  - 給出關鍵斐波那契支撐/阻力位（0.382/0.618/1.618）。
  - 說明當前是買入時機、等待機會還是規避。
  - 標註波浪計數的置信度（高/中/低）。

  評分調整建議：
  - 第2浪底部企穩（黃金坑）：`sentiment_score +15`
  - 第3浪突破確認：`sentiment_score +12`
  - 第5浪末端/頂背離：`sentiment_score -10`
  - C浪下跌中：`sentiment_score -12`
