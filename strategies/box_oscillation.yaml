# Box Range Trading Strategy / 箱體震盪戰法
# Buy at box support, sell at box resistance, profit from range-bound oscillation.

name: box_oscillation
display_name: 箱體震盪
description: 識別價格箱體區間，在箱底買入、箱頂減倉，適用於橫盤震盪行情。
category: framework
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote

instructions: |
  **箱體震盪戰法（Box Range Trading Strategy）**

  核心邏輯：箱體內部價格在阻力位與支撐位之間反覆震盪，
  "貼著支撐買、接近阻力賣"，透過波段操作獲取區間收益。

  ## 分析步驟

  ### 1. 箱體識別
  使用 `get_daily_history` 獲取近 60~120 日資料：

  - **箱體頂部（阻力位）**：近期多次觸碰但未有效突破的高點連線。
    通常為 20~60 日內3次以上的高點聚集區域。
  - **箱體底部（支撐位）**：近期多次下探但未有效跌破的低點連線。
  - 箱體有效性：頂部和底部各至少觸碰 2~3 次方可確認。
  - 使用 `analyze_trend` 的 support_levels / resistance_levels 輔助定位。

  ### 2. 當前位置判斷
  使用 `get_realtime_quote` 獲取現價，與箱體邊界對比：

  - **箱底區域**（距支撐 ≤5%）：買入/加倉訊號，止損設箱底下方 3%。
  - **箱中區域**（箱體中間 1/3）：觀望，不主動操作。
  - **箱頂區域**（距阻力 ≤5%）：減倉/止盈訊號，無需追高。

  ### 3. 量能輔助判斷
  - **箱底放量企穩**：支撐有效的強訊號，可較重倉。
  - **箱頂縮量滯漲**：阻力有效的賣出訊號。
  - **箱體突破（放量超過均量2倍以上）**：
    - 向上有效突破 → 轉為多頭趨勢策略，新目標 = 箱體高度延伸。
    - 向下有效跌破 → 離場等待，原支撐轉阻力。

  ### 4. 箱體寬度與預期收益
  - 計算箱體寬度：(頂部 - 底部) / 底部 × 100%。
  - 寬度 < 5%：操作空間過小，不建議參與。
  - 寬度 5%~15%：標準箱體，波段操作可行。
  - 寬度 > 15%：大箱體，可做更大波段。

  ### 5. 假突破識別
  - 單日盤中觸及阻力/支撐後快速回撤，收盤迴到箱內 → 假突破，維持箱體操作。
  - 連續兩日收盤突破箱體邊界，且量能放大 → 真突破，修改策略。

  ### 6. 輸出要求
  - 明確給出箱體頂部價位和底部價位。
  - 當前價格所處區間（箱底/箱中/箱頂）。
  - 若價格已突破，說明突破方向及新目標。
  - 建議倉位與止損位。

  評分調整建議：
  - 箱底企穩 + 縮量：`sentiment_score +10`
  - 箱底放量攻頂：`sentiment_score +12`
  - 箱體向上有效突破：`sentiment_score +15，轉趨勢策略`
  - 處於箱頂區域：`sentiment_score -5（不追高）`
  - 箱底有效跌破：`sentiment_score -15，離場`
