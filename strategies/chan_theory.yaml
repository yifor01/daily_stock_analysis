# Chan Theory Strategy / 纏論
# Based on Zen channel theory: pen, stroke, segment, hub structure analysis.

name: chan_theory
display_name: 纏論
description: 基於纏論筆、線段、中樞結構，判斷趨勢級別、買賣點與背馳訊號。
category: framework
core_rules: [1, 2, 3, 4]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote

instructions: |
  **纏論（Chan Theory / Zen Channel Theory）**

  核心框架：分型 → 筆 → 線段 → 中樞 → 趨勢

  ## 分析步驟

  ### 1. 判斷價格結構（中樞識別）
  - 使用 `get_daily_history` 獲取近 60 日日線資料。
  - 識別近期價格的高低點序列，判斷當前是否在
    **震盪中樞**（1個以上中樞）還是**趨勢段**（脫離中樞向上/向下）。
  - 中樞：連續3段走勢重疊區間，價格在此區間反覆震盪。
  - 趨勢：連續3個同級別中樞均向同一方向移動。

  ### 2. 背馳判斷（最高優先順序訊號）
  - **頂背馳**：價格創新高但MACD紅柱面積縮小 → 賣出/減倉訊號。
  - **底背馳**：價格創新低但MACD綠柱面積縮小 → 買入/加倉訊號。
  - 使用 `analyze_trend` 獲取 MACD 資料，與價格高低點對比。

  ### 3. 買賣點判定
  - **一買**（最強）：下跌趨勢中，最後一箇中樞出現底背馳。
  - **二買**：離開下跌中樞後的第一次回撥不破中樞高點。
  - **三買**：中樞震盪後向上突破（不回中樞內）。
  - **一賣/二賣/三賣**：對稱結構，方向相反。
  - 當前價格所處的買賣點級別決定倉位大小。

  ### 4. 級別與倉位
  - 日線級別買賣點可用較重倉位 (30-50%)。
  - 周線級別買賣點可用較大倉位 (50-80%)。
  - 多級別共振（日線+周線同方向）時訊號最強。

  ### 5. 輸出要求
  - 明確說明當前處於：上漲趨勢/下跌趨勢/中樞震盪。
  - 指出是否存在背馳訊號及背馳級別。
  - 給出當前買賣點型別（一買/二買/三買 等），若無則寫"暫無明確買賣點"。
  - 止損設於前低（買入時）或前高（賣出時）。

  評分調整建議：
  - 底背馳 + 一買訊號：`sentiment_score +15`
  - 二買/三買共振：`sentiment_score +10`
  - 中樞震盪無明確方向：`sentiment_score 維持基準`
  - 頂背馳 / 趨勢向下：`sentiment_score -15`
