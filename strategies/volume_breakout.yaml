# Volume Breakout Strategy / 放量突破
# Price breaks above resistance on heavy volume (>2x average).

name: volume_breakout
display_name: 放量突破
description: 檢測放量突破阻力位訊號。適用於股價接近已知阻力位時。
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote

instructions: |
  **放量突破（Volume Breakout Strategy）**

  突破判定標準：

  1. **阻力位識別**：
     - 使用 `analyze_trend` → resistance_levels 獲取阻力位。
     - 通常為 20 日高點或前期震盪平臺頂部。

  2. **量能確認**（關聯理念3：效率優先）：
     - 當日成交量 > 5 日均量的 2 倍。
     - 使用 `get_realtime_quote` → volume_ratio > 2.0 確認。
     - 使用 `get_daily_history` 計算均量進行交叉驗證。

  3. **價格確認**（關聯理念1：嚴進策略）：
     - 收盤價必須站上阻力位。
     - 收盤應在當日振幅上方 30%（強勢收盤）。
     - 突破後乖離率檢查：仍需 < 5%，避免追高。

  4. **後續驗證**（如有資料）：
     - 次日開盤應在突破位之上，區分真突破與假突破。

  5. **風險過濾**（關聯理念5：風險排查）：
     - 透過 `search_stock_news` 檢查無重大利空。
     - PE 不應過高（避免泡沫型突破）。

  評分調整：
  - 放量突破確認：sentiment_score +12
  - 突破伴隨板塊共振（板塊也走強）：額外 +5
  - 理想買點設在突破位附近，止損設在突破位下方 3%。
  - 在 `buy_reason` 和 `volume_analysis` 中註明"放量突破"。
