# Sentiment Cycle Strategy / 情緒週期
# Uses market sentiment, turnover rate and volume pattern to time entries against crowd behavior.

name: emotion_cycle
display_name: 情緒週期
description: 基於市場情緒、換手率與量價結構，識別情緒低點（恐慌底）與情緒高點（狂熱頂），逆情緒佈局。
category: framework
core_rules: [1, 2, 3, 5]
required_tools:
  - get_daily_history
  - get_realtime_quote
  - analyze_trend
  - search_stock_news

instructions: |
  **情緒週期策略（Sentiment Cycle Strategy）**

  核心哲學：市場參與者的情緒在"恐慌→悲觀→懷疑→希望→樂觀→興奮→貪婪→狂熱"
  之間迴圈。聰明錢在恐慌底部佈局，在狂熱頂部離場。

  ## 情緒階段量化指標

  ### 第一步：換手率分析（情緒熱度核心指標）
  使用 `get_daily_history` 和 `get_realtime_quote`：

  - **換手率 < 0.5%/日**：市場冷淡，無人關注，潛在底部區域（貪婪時買入別人的恐慌）。
  - **換手率 0.5%~2%**：正常交投，情緒平穩。
  - **換手率 2%~5%**：活躍，市場開始關注，不宜追高。
  - **換手率 > 5%**：高熱度，遊資/散戶湧入，警惕情緒頂。
  - **換手率 > 10%（日均）**：極度過熱，通常為短期頂部。

  ### 第二步：連續換手率走勢
  使用 `get_daily_history` 計算近 20 日換手率走勢：
  - 由高向低（持續降溫）+ 成交量萎縮 → 情緒退潮，耐心等待。
  - 由低向高（加速升溫）+ 成交量陡增 → 情緒啟動，可介入。
  - 突然單日暴量（換手率超過前期5倍）→ 往往是主力出貨，需警惕。

  ### 第三步：新聞情緒面分析
  使用 `search_stock_news` 搜尋近期新聞，分析情緒傾向：
  - 新聞集中出現"利好兌現、業績超預期、漲停板、機構推薦"等 → 情緒可能過熱。
  - 新聞集中出現"業績下滑、利空、跌破支撐" → 悲觀情緒可能造就底部。
  - 散戶論壇/社交媒體情緒極端負面 → 反向指標，可能接近底部。

  ### 第四步：均線收縮與波動率
  使用 `analyze_trend`：
  - MA5/MA10/MA20 三線粘合（均線收縮）→ 蓄勢，方向待定，情緒冷淡。
  - 波動率降至低位（ATR 萎縮）→ 情緒極度低迷，蓄勢爆發前兆。

  ## 情緒底部特徵（買入區）
  滿足以下3項以上：
  ✅ 近20日換手率處於近一年低位
  ✅ 成交量持續萎縮，低於近60日均量50%以上
  ✅ 近期新聞以低調、中性或負面為主
  ✅ 股價在MA20附近或以下，但未出現恐慌性暴跌
  ✅ 機構持倉穩定或小幅增加（如有資料）

  ## 情緒頂部特徵（減倉區）
  滿足以下3項以上：
  ⚠️ 近5日換手率 > 近20日均值的2倍
  ⚠️ 成交量脈衝式放大（單日）
  ⚠️ 新聞以利好兌現、機構目標價大幅上調、散戶追捧為主
  ⚠️ 股價偏離MA5超過8%（高乖離率）
  ⚠️ MACD 出現頂背離

  ## 輸出要求
  - 當前情緒階段判斷：冷淡底部 / 平穩 / 升溫介入 / 過熱警惕 / 狂熱頂部。
  - 當前換手率與近一年換手率均值對比。
  - 是否滿足情緒底部或頂部特徵（列出滿足條項）。
  - 給出逆情緒操作建議（大眾恐慌我貪婪，大眾貪婪我謹慎）。

  評分調整建議：
  - 情緒底部特徵滿足3項以上：`sentiment_score +14`
  - 情緒底部特徵滿足全部5項：`sentiment_score +20`
  - 情緒頂部特徵滿足3項以上：`sentiment_score -12`
  - 情緒頂部特徵滿足全部5項：`sentiment_score -20`
  - 情緒平穩區間：不調整基礎分
